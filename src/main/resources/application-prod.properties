server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.storage.local-root=${APP_STORAGE_LOCAL_ROOT:/app/uploads}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:https://aprendemosya.com/uploads}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.user-name-attribute=sub

app.auth.google-success-url=${APP_AUTH_GOOGLE_SUCCESS_URL:https://aprendemosya.com/?auth=google-success}
app.auth.google-failure-url=${APP_AUTH_GOOGLE_FAILURE_URL:https://aprendemosya.com/?auth=google-error}
